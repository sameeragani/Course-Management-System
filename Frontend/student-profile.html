<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Profile | LearnHub</title>

    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="dashboard-container">

    <!-- Sidebar -->

    <aside class="sidebar">

        <h2>LearnHub</h2>

        <ul>

            <li><a href="student-dashboard.html">Dashboard</a></li>

            <li><a href="my-courses.html">My Courses</a></li>

            <li><a href="browse-courses.html">Browse Courses</a></li>

            <li><a href="student-profile.html">My Profile</a></li>

            <li><a href="index.html">Logout</a></li>

        </ul>

    </aside>

    <!-- Main Content -->

    <main class="dashboard-content">

        <header class="dashboard-header">

            <h1>My Profile</h1>

            <p>Update your personal details.</p>

        </header>

        <section class="recent-courses" style="max-width:600px;">

            <h2>Personal Details</h2>

            <form>

                <div class="form-group">
                    <label>Full Name</label>
                    <input type="text" value="Priya Sharma">
                </div>

                <div class="form-group">
                    <label>Email Address</label>
                    <input type="email" value="priya.sharma@example.com">
                </div>

                <div class="form-group">
                    <label>Phone Number</label>
                    <input type="tel" value="+91 98765 43210">
                </div>

                <div class="form-group">
                    <label>New Password</label>
                    <input type="password" placeholder="Leave blank to keep current password">
                </div>

                <a href="student-dashboard.html" class="register-button" style="display:block;text-align:center;text-decoration:none;">
                    Save Changes
                </a>

            </form>

        </section>

    </main>

</div>

</body>
</html>
