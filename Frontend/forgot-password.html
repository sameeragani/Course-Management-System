<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Reset your password · Vantage Learning</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600&family=Source+Sans+3:wght@400;600;700&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
</head>
<body>

<div class="auth-shell">
  <div class="auth-brand">
    <a href="index.html" class="seal">
      <svg width="30" height="30" viewBox="0 0 30 30" fill="none" style="color:var(--gold)">
        <circle cx="15" cy="12" r="9" stroke="currentColor" stroke-width="2"/>
        <path d="M9 19 L7 27 L15 24 L23 27 L21 19" stroke="currentColor" stroke-width="2" stroke-linejoin="round"/>
        <path d="M15 7 L16.7 10.5 L20.5 11 L17.7 13.6 L18.4 17.4 L15 15.5 L11.6 17.4 L12.3 13.6 L9.5 11 L13.3 10.5 Z" fill="currentColor"/>
      </svg>
      <span class="seal-word">Vantage <em>Learning</em></span>
    </a>
    <div class="quote">
      "Forgot my password twice this year. Both times I was back in within a minute."
      <div class="quote-who">— Community feedback survey, 2026</div>
    </div>
  </div>

  <div class="auth-form-side">
    <div class="auth-card">
      <span class="eyebrow">Account recovery</span>
      <h1>Forgot your password?</h1>
      <p class="muted" style="margin-bottom:1.6rem">Enter the email on your account and we'll send a link to reset it.</p>

      <div>
        <div class="form-group">
          <label for="email">Email address</label>
          <input type="email" id="email" name="email" placeholder="ava@example.com" required>
        </div>

        <button type="button" class="btn btn-primary btn-block">Send reset link</button>
      </div>

      <p class="switch"><a href="login.html">&larr; Back to log in</a></p>
    </div>
  </div>
</div>

</body>
</html>
