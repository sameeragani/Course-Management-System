<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Log in · Vantage Learning</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600&family=Source+Sans+3:wght@400;600;700&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
</head>
<body>

<div class="auth-shell">
  <div class="auth-brand">
    <a href="index.html" class="seal">
      <svg width="30" height="30" viewBox="0 0 30 30" fill="none" style="color:var(--gold)">
        <circle cx="15" cy="12" r="9" stroke="currentColor" stroke-width="2"/>
        <path d="M9 19 L7 27 L15 24 L23 27 L21 19" stroke="currentColor" stroke-width="2" stroke-linejoin="round"/>
        <path d="M15 7 L16.7 10.5 L20.5 11 L17.7 13.6 L18.4 17.4 L15 15.5 L11.6 17.4 L12.3 13.6 L9.5 11 L13.3 10.5 Z" fill="currentColor"/>
      </svg>
      <span class="seal-word">Vantage <em>Learning</em></span>
    </a>
    <div class="quote">
      "Picking up exactly where I left off, on any device, is the whole reason I stuck with it."
      <div class="quote-who">— Daniel K., SQL for Analysts, in progress</div>
    </div>
  </div>

  <div class="auth-form-side">
    <div class="auth-card">
      <span class="eyebrow">Welcome back</span>
      <h1>Log in to Vantage</h1>
      <p class="muted" style="margin-bottom:1.6rem">Continue exactly where you left off.</p>

      <div>
        <div class="form-group">
          <label for="email">Email address</label>
          <input type="email" id="email" name="email" placeholder="ava@example.com" required>
        </div>

        <div class="form-group">
          <label for="password">Password</label>
          <input type="password" id="password" name="password" placeholder="Your password" required>
        </div>

        <div class="form-group" style="display:flex;align-items:center;justify-content:space-between">
          <span class="checkbox-row">
            <input type="checkbox" id="remember" name="remember">
            <label for="remember" style="margin:0;font-weight:400">Remember me</label>
          </span>
          <a href="forgot-password.html" style="font-size:.86rem">Forgot password?</a>
        </div>

        <button type="button" class="btn btn-primary btn-block">Log in</button>
      </div>

      <p class="switch">New to Vantage? <a href="register.html">Create an account</a></p>
    </div>
  </div>
</div>

</body>
</html>
