<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Add Course | LearnHub</title>

    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="dashboard-container">

    <!-- Sidebar -->

    <aside class="sidebar">

        <h2>LearnHub</h2>

        <ul>

            <li><a href="admin-dashboard.html">Dashboard</a></li>

            <li><a href="courses.html">Manage Courses</a></li>

            <li><a href="add-course.html">Add Course</a></li>

            <li><a href="browse-courses.html">Browse Courses</a></li>

            <li><a href="index.html">Logout</a></li>

        </ul>

    </aside>

    <!-- Main Content -->

    <main class="dashboard-content">

        <header class="dashboard-header">

            <h1>Add New Course</h1>

            <p>Fill in the details below to publish a new course.</p>

        </header>

        <section class="recent-courses" style="max-width:600px;">

            <form>

                <div class="form-group">
                    <label>Course Name</label>
                    <input type="text" placeholder="e.g. Advanced JavaScript">
                </div>

                <div class="form-group">
                    <label>Instructor</label>
                    <input type="text" placeholder="Enter instructor name">
                </div>

                <div class="form-group">
                    <label>Category</label>

                    <select>
                        <option>Web Development</option>
                        <option>Programming</option>
                        <option>Design</option>
                        <option>Analytics</option>
                    </select>
                </div>

                <div class="form-group">
                    <label>Duration (Weeks)</label>
                    <input type="number" placeholder="e.g. 8">
                </div>

                <div class="form-group">
                    <label>Total Seats</label>
                    <input type="number" placeholder="e.g. 30">
                </div>

                <div class="form-group">
                    <label>Course Description</label>
                    <input type="text" placeholder="Short course description">
                </div>

                <a href="courses.html" class="register-button" style="display:block;text-align:center;text-decoration:none;">
                    Add Course
                </a>

            </form>

        </section>

    </main>

</div>

</body>
</html>
