<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Add Course · Vantage Learning</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600&family=Source+Sans+3:wght@400;600;700&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
</head>
<body>

<div class="app-shell">
  <aside class="sidebar">
    <a href="admin-dashboard.html" class="seal">
      <svg width="26" height="26" viewBox="0 0 30 30" fill="none" style="color:var(--gold)">
        <circle cx="15" cy="12" r="9" stroke="currentColor" stroke-width="2"/>
        <path d="M9 19 L7 27 L15 24 L23 27 L21 19" stroke="currentColor" stroke-width="2" stroke-linejoin="round"/>
        <path d="M15 7 L16.7 10.5 L20.5 11 L17.7 13.6 L18.4 17.4 L15 15.5 L11.6 17.4 L12.3 13.6 L9.5 11 L13.3 10.5 Z" fill="currentColor"/>
      </svg>
      <span class="seal-word">Vantage <em>Admin</em></span>
    </a>
    <nav class="sidebar-nav">
      <a href="admin-dashboard.html">Dashboard</a>
      <a href="courses.html">Courses</a>
      <a href="add-course.html" class="active">Add course</a>
      <a href="notifications.html">Notifications</a>
    </nav>
    <div class="sidebar-foot">
      <span class="who">Renata Osei</span>
      <a href="index.html">Log out</a>
    </div>
  </aside>

  <div class="main">
    <div class="topbar"><h1>Add a new course</h1></div>

    <div class="main-content">
      <div class="crumbs"><a href="courses.html">Courses</a><span>/</span>Add course</div>

      <div class="card">
        <div class="card-header"><h2>Course details</h2></div>

        <div class="form-group">
          <label for="title">Course title <span class="req">*</span></label>
          <input type="text" id="title" placeholder="e.g. Intro to Data Visualization" required>
        </div>

        <div class="form-row">
          <div class="form-group">
            <label for="category">Category <span class="req">*</span></label>
            <select id="category">
              <option>Design</option>
              <option>Data</option>
              <option>Career</option>
              <option>Development</option>
              <option>Marketing</option>
            </select>
          </div>
          <div class="form-group">
            <label for="level">Level <span class="req">*</span></label>
            <select id="level">
              <option>Beginner</option>
              <option>Intermediate</option>
              <option>Advanced</option>
            </select>
          </div>
        </div>

        <div class="form-group">
          <label for="description">Course description <span class="req">*</span></label>
          <textarea id="description" placeholder="What will learners be able to do after finishing this course?"></textarea>
        </div>

        <div class="form-row">
          <div class="form-group">
            <label for="duration">Estimated duration</label>
            <input type="text" id="duration" placeholder="e.g. 9h 40m">
          </div>
          <div class="form-group">
            <label for="modules">Number of modules</label>
            <input type="number" id="modules" placeholder="6">
          </div>
        </div>

        <div class="form-row">
          <div class="form-group">
            <label for="price">Price (USD)</label>
            <input type="number" id="price" placeholder="49">
          </div>
          <div class="form-group">
            <label for="status">Status</label>
            <select id="status">
              <option>Draft</option>
              <option>Published</option>
            </select>
          </div>
        </div>

        <div class="form-group">
          <label for="thumbnail">Course thumbnail</label>
          <input type="text" id="thumbnail" placeholder="Upload or paste image URL">
          <p class="form-hint">Recommended size: 1200 × 675px.</p>
        </div>
      </div>

      <div style="display:flex;gap:1rem;margin-top:1.4rem">
        <button type="button" class="btn btn-primary">Save course</button>
        <a href="courses.html" class="btn btn-outline">Cancel</a>
      </div>
    </div>
  </div>
</div>

</body>
</html>
