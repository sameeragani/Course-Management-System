<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Certificate of Completion · Technical Writing 101</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600&family=Source+Sans+3:wght@400;600;700&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
</head>
<body>

<div class="certificate-wrap">
  <div style="width:100%;max-width:860px">

    <div class="certificate">
      <span class="eyebrow">Certificate of Completion</span>
      <p class="muted" style="margin-top:1.2rem">This certifies that</p>
      <div class="cert-name">Ava Thompson</div>
      <p class="muted">has successfully completed</p>
      <div class="cert-course">Technical Writing 101</div>

      <div class="cert-seal">
        <svg width="86" height="86" viewBox="0 0 30 30" fill="none" style="color:var(--gold-dark)">
          <circle cx="15" cy="12" r="9" stroke="currentColor" stroke-width="1.4"/>
          <path d="M9 19 L7 27 L15 24 L23 27 L21 19" stroke="currentColor" stroke-width="1.4" stroke-linejoin="round"/>
          <path d="M15 7 L16.7 10.5 L20.5 11 L17.7 13.6 L18.4 17.4 L15 15.5 L11.6 17.4 L12.3 13.6 L9.5 11 L13.3 10.5 Z" fill="currentColor"/>
        </svg>
      </div>

      <div class="cert-footer">
        <div class="sig">
          <div class="name">Renata Osei</div>
          <div class="muted" style="font-size:.82rem">Head of Learning, Vantage Learning</div>
        </div>
        <div style="text-align:right">
          <div class="muted" style="font-size:.82rem">Completed May 2, 2026</div>
          <div class="cert-id">Certificate ID: VL-CERT-77284</div>
        </div>
      </div>
    </div>

    <div class="print-actions">
      <a href="progress.html" class="btn btn-outline">Back to progress</a>
      <a href="#" class="btn btn-primary" style="margin-left:.7em">Download PDF</a>
    </div>
  </div>
</div>

</body>
</html>
